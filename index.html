<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="main.js"></script>

</head>
<body>
    <div id="LC" class="container">
        <img src="logo.png" alt="" style="width:100px">
        <h1>Login</h1>

        <label for="username">Username:</label>
        <input type="text" id="username" class="form-control">
       
        <label for="password">Password:</label>
        <input type="password" id="password" class="form-control">

        <div>
            <input type="checkbox" id="stay">
            <label for="stay">Stay logged in</label>
            <p style="opacity: 0.5;">your session will stay active on this device.</p>
        </div>

        <button id="FR" class="btn btn-primary" type="button" onclick="logAccount()">Log In</button>
        <button id="FR" class="btn btn-secondary" type="button">Cancel</button>
        <hr>
        <button style="opacity: 0.7;" class="btn btn-link">Forgot Username / Password?</button>
    </div>

    <script src="proj.js"></script>
<footer id="footer" class="corner-footer">

</footer>

</body>
</html>
